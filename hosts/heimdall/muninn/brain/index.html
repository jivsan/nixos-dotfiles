<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>muninn // brain</title>
<style>
  :root { --pink:#ff4fa3; --cyan:#2de2e6; --bg:#05060f;
    --ok:#5ad1a0; --bad:#ff5c6c; --ink:#cdd6f4; --ink2:#9aa5d6; --ink3:#7a86b6; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); overflow:hidden;
    font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--ink); }
  #graph { position:fixed; inset:0; }
  .col { position:fixed; top:18px; bottom:18px; display:flex; flex-direction:column;
    gap:12px; pointer-events:none; z-index:10; transition:opacity .25s, transform .25s; }
  #hud-l { left:18px;  width:342px; }
  #hud-r { right:18px; width:372px; }
  body.zen .col { opacity:0; pointer-events:none; transform:translateY(6px); }
  .card { background:rgba(10,12,24,.74); border:1px solid rgba(45,226,230,.18);
    border-radius:14px; padding:13px 15px; backdrop-filter:blur(8px);
    box-shadow:0 0 40px rgba(255,79,163,.08); pointer-events:auto; min-height:0; }
  h1 { margin:0; font-size:20px; letter-spacing:.5px;
    background:linear-gradient(90deg,var(--pink),var(--cyan)); -webkit-background-clip:text;
    background-clip:text; color:transparent; }
  .sub { font-size:11px; color:var(--ink3); margin-top:2px; }
  .sep { margin:0 0 8px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--cyan); }
  .sep small { text-transform:none; letter-spacing:0; color:var(--ink3); float:right; }

  /* stat tiles */
  .tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:11px; }
  .tile { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05);
    border-radius:9px; padding:7px 9px; }
  .tile b { font-size:19px; color:#fff; display:block; line-height:1.15; }
  .tile span { font-size:9.5px; color:var(--ink3); text-transform:uppercase; letter-spacing:.6px; }
  .tile.warn b { color:var(--bad); }
  .tile.hot  b { color:var(--cyan); }
  .status { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--ink2); margin-top:10px; }
  .pulse { width:9px; height:9px; border-radius:50%; background:var(--cyan);
    box-shadow:0 0 0 var(--cyan); animation:p 1.8s infinite; }
  @keyframes p { 0%{box-shadow:0 0 0 0 rgba(45,226,230,.5)} 70%{box-shadow:0 0 0 10px rgba(45,226,230,0)} 100%{box-shadow:0 0 0 0 rgba(45,226,230,0)} }

  /* agent health */
  .agent { display:flex; align-items:baseline; gap:8px; font-size:11px;
    padding:4px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  .agent:last-child { border-bottom:0; }
  .agent .nm { width:96px; color:var(--ink); flex:none; }
  .agent .tm { color:var(--ink3); font-size:10px; flex:1; min-width:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge { font-size:9.5px; padding:1px 7px; border-radius:8px; flex:none;
    border:1px solid transparent; letter-spacing:.4px; }
  .badge.ok   { color:var(--ok);   border-color:rgba(90,209,160,.4);  background:rgba(90,209,160,.08); }
  .badge.bad  { color:var(--bad);  border-color:rgba(255,92,108,.45); background:rgba(255,92,108,.10); }
  .badge.run  { color:var(--cyan); border-color:rgba(45,226,230,.4);  background:rgba(45,226,230,.08); }
  .svc { display:inline-flex; align-items:center; gap:5px; font-size:10px; color:var(--ink2); margin-right:12px; }
  .svc i { width:7px; height:7px; border-radius:50%; display:inline-block; }

  /* feeds */
  .scroll { overflow-y:auto; min-height:0; }
  .scroll::-webkit-scrollbar{ width:6px } .scroll::-webkit-scrollbar-thumb{ background:rgba(255,79,163,.3); border-radius:3px }
  .li { padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04); word-break:break-word;
    font-size:11px; line-height:1.5; }
  .li:last-child { border-bottom:0; }
  .li .t { color:var(--ink3); font-size:10px; margin-left:6px; }
  .job { color:var(--pink); }
  .wl { color:var(--pink); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .empty { color:var(--ink3); font-size:11px; font-style:italic; padding:2px 0; }
  .legend { font-size:10px; color:var(--ink3); margin-top:9px; display:flex; flex-wrap:wrap; gap:6px 12px; }
  .legend i { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle; }

  #zen { position:fixed; right:18px; top:50%; z-index:11; opacity:.35; cursor:pointer;
    background:none; border:1px solid rgba(255,255,255,.15); color:var(--ink2);
    border-radius:8px; font:inherit; font-size:10px; padding:3px 8px; }
  body.zen #zen { opacity:.9; }
  @media (max-width:1180px){ #hud-r { display:none; } }
</style>
<script src="//unpkg.com/3d-force-graph"></script>
</head>
<body>
<div id="graph"></div>
<button id="zen" title="toggle panels (h)">☯ zen</button>

<div class="col" id="hud-l">
  <div class="card">
    <h1>muninn // brain</h1>
    <div class="sub">agentic OS · live knowledge graph</div>
    <div class="tiles" id="tiles"></div>
    <div class="status"><span class="pulse"></span> huginn online · updated <span id="stamp">–</span></div>
    <div class="legend">
      <span><i style="background:#ff4fa3"></i>MOC</span>
      <span><i style="background:#2de2e6"></i>inbox</span>
      <span><i style="background:#39d0ff"></i>journal</span>
      <span><i style="background:#8a7dff"></i>resources</span>
      <span><i style="background:#5ad1a0"></i>areas</span>
      <span><i style="background:linear-gradient(90deg,#ff4fa3,#2de2e6,#ffd166)"></i>code</span>
      <span><i style="background:#ffffff"></i>fresh (24h)</span>
    </div>
  </div>
  <div class="card">
    <div class="sep">agents <small id="svcs"></small></div>
    <div id="agents" class="empty">connecting…</div>
  </div>
  <div class="card" style="flex:1; display:flex; flex-direction:column;">
    <div class="sep">activity log</div>
    <div id="feed" class="scroll" style="flex:1">connecting…</div>
  </div>
</div>

<div class="col" id="hud-r">
  <div class="card" style="max-height:34%; display:flex; flex-direction:column;">
    <div class="sep">nightly digest <small id="digest-day"></small></div>
    <div id="digest" class="scroll" style="flex:1">connecting…</div>
  </div>
  <div class="card" style="max-height:22%; display:flex; flex-direction:column;">
    <div class="sep">inbox queue <small id="inbox-n"></small></div>
    <div id="inbox" class="scroll" style="flex:1"></div>
  </div>
  <div class="card" style="flex:1; display:flex; flex-direction:column;">
    <div class="sep">huginn commits <small>vault git</small></div>
    <div id="gitlog" class="scroll" style="max-height:46%"></div>
    <div class="sep" style="margin-top:10px">recent notes</div>
    <div id="recent" class="scroll" style="flex:1"></div>
  </div>
</div>

<script>
  const FOLDER = { MOCs:'#ff4fa3', root:'#ff8ac4', _inbox:'#2de2e6', journal:'#39d0ff', Resources:'#8a7dff', Areas:'#5ad1a0' };
  const colorFor = n => (n.recent && n.source === 'note') ? '#ffffff' : (n.color || FOLDER[n.folder] || '#7f8cff');
  const esc = s => (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const rel = t => {                       // epoch → "5m ago" / "in 2h" / "—"
    if (!t) return '—';
    const d = Date.now()/1000 - t, a = Math.abs(d);
    const s = a < 90 ? `${a|0}s` : a < 5400 ? `${Math.round(a/60)}m`
            : a < 129600 ? `${Math.round(a/3600)}h` : `${Math.round(a/86400)}d`;
    return d >= 0 ? `${s} ago` : `in ${s}`;
  };
  // render [[wikilinks]] in digest/report text
  const wiki = s => esc(s).replace(/\[\[([^\]]+)\]\]/g, '<span class="wl">$1</span>');

  // ── 3D graph (unchanged behaviour) ──
  const linkColor = l => (l.source && l.source.color) || (l.target && l.target.color) || '#5b6bd6';
  let hoverNode = null;
  const highlightLinks = new Set();
  const Graph = ForceGraph3D()(document.getElementById('graph'))
    .backgroundColor('#05060f')
    .showNavInfo(false)
    .nodeLabel(n => (n.label || n.id) + (n.source === 'code' ? '  ·  code' : ''))
    .nodeVal(n => n.val)
    .nodeRelSize(4)
    .nodeResolution(12)
    .nodeOpacity(0.96)
    .nodeColor(n => n === hoverNode ? '#ffffff' : colorFor(n))
    .linkColor(l => highlightLinks.has(l) ? '#ffffff' : linkColor(l))
    .linkOpacity(0.36)
    .linkWidth(l => highlightLinks.has(l) ? 2.4 : 0.7)
    .linkCurvature(0.18)
    .linkDirectionalParticles(l => highlightLinks.has(l) ? 4 : 1)
    .linkDirectionalParticleWidth(1.3)
    .linkDirectionalParticleSpeed(0.006)
    .linkDirectionalParticleColor(l => highlightLinks.has(l) ? '#ffffff' : '#2de2e6')
    .onNodeHover(node => {
      if (node === hoverNode) return;
      hoverNode = node || null;
      highlightLinks.clear();
      if (node) for (const l of Graph.graphData().links) {
        if (l.source === node || l.target === node) highlightLinks.add(l);
      }
      document.getElementById('graph').style.cursor = node ? 'pointer' : '';
      Graph.linkWidth(Graph.linkWidth()).nodeColor(Graph.nodeColor());
    })
    .onNodeClick(node => {
      const d = 90;
      const r = 1 + d / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
      Graph.cameraPosition({ x: (node.x||0)*r, y: (node.y||0)*r, z: (node.z||0)*r }, node, 900);
    })
    .warmupTicks(60)
    .cooldownTime(9000);
  Graph.d3Force('charge').strength(-42);
  const controls = Graph.controls();
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  const nodeById = new Map();
  let lastGraphGen = -1, lastActGen = -1;
  async function refreshGraph() {
    try {
      const data = await (await fetch('graph.json?_=' + Date.now())).json();
      if (data.generated === lastGraphGen) return;
      lastGraphGen = data.generated;
      const nodes = data.nodes.map(n => {
        const ex = nodeById.get(n.id);
        if (ex) { Object.assign(ex, n); return ex; }
        nodeById.set(n.id, n); return n;
      });
      const ids = new Set(data.nodes.map(n => n.id));
      for (const k of [...nodeById.keys()]) if (!ids.has(k)) nodeById.delete(k);
      Graph.graphData({ nodes, links: data.links });
      setTimeout(() => Graph.zoomToFit(700, 80), 600);
    } catch (e) {}
  }

  // ── HUD panels ──
  const $ = id => document.getElementById(id);
  function tiles(c) {
    const t = [
      { k:'notes',   v:c.notes },
      { k:'links',   v:c.links },
      { k:'code',    v:c.code ?? 0 },
      { k:'MOCs',    v:c.mocs ?? '–' },
      { k:'inbox',   v:c.inbox ?? 0,   cls:(c.inbox ?? 0) > 0 ? 'hot' : '' },
      { k:'orphans', v:c.orphans ?? 0, cls:(c.orphans ?? 0) > 0 ? 'warn' : '' },
    ];
    $('tiles').innerHTML = t.map(x =>
      `<div class="tile ${x.cls||''}"><b>${x.v}</b><span>${x.k}</span></div>`).join('');
  }
  function badge(a) {
    if (a.active) return '<span class="badge run">⟳ running</span>';
    if (a.result === 'success') return '<span class="badge ok">✓ ok</span>';
    if (a.result === 'unknown' || !a.last) return '<span class="badge">·</span>';
    return `<span class="badge bad">✗ ${esc(a.result)}</span>`;
  }
  async function refreshActivity() {
    try {
      const a = await (await fetch('activity.json?_=' + Date.now())).json();
      if (a.generated === lastActGen) return;
      lastActGen = a.generated;
      $('stamp').textContent = new Date(a.generated * 1000).toLocaleTimeString();
      tiles(a.counts);

      $('agents').innerHTML = (a.agents || []).map(x =>
        `<div class="agent"><span class="nm">${esc(x.name)}</span>${badge(x)}
         <span class="tm">${rel(x.last)}${x.next ? ' · next ' + rel(x.next) : ''}</span></div>`
      ).join('') || '<div class="empty">no agent data</div>';
      $('svcs').innerHTML = (a.services || []).map(s =>
        `<span class="svc"><i style="background:${s.ok ? 'var(--ok)' : 'var(--bad)'}"></i>${esc(s.name)} ${s.ok ? 'up' : 'DOWN'}</span>`
      ).join('');

      const d = a.digest || {};
      $('digest-day').textContent = d.day || '';
      $('digest').innerHTML = d.text
        ? d.text.split('\n').filter(l => l.trim())
            .map(l => `<div class="li">${wiki(l.replace(/^[-*]\s*/, '• '))}</div>`).join('')
        : '<div class="empty">no digest yet — huginn writes one at 23:00</div>';

      const inbox = a.inbox || [];
      $('inbox-n').textContent = inbox.length ? `${inbox.length} waiting` : '';
      $('inbox').innerHTML = inbox.length
        ? inbox.map(x => `<div class="li"><span class="dot" style="background:#2de2e6"></span>${esc(x.name)}<span class="t">${rel(x.mtime)}</span></div>`).join('')
        : '<div class="empty">empty — everything filed ✓</div>';

      $('gitlog').innerHTML = (a.gitlog || []).length
        ? a.gitlog.map(g => `<div class="li">${esc(g.msg)}<span class="t">${rel(g.t)}</span></div>`).join('')
        : '<div class="empty">vault has no git history yet</div>';

      $('recent').innerHTML = (a.recent || []).map(r =>
        `<div class="li"><span class="dot" style="background:${FOLDER[r.folder]||'#7f8cff'}"></span>${esc(r.id)}<span class="t">${rel(r.mtime)}</span></div>`
      ).join('');

      $('feed').innerHTML = (a.log || []).slice().reverse().map(x =>
        `<div class="li"><span class="job">${esc(x.job)}</span> ${esc(x.line)}</div>`).join('');
    } catch (e) {}
  }

  const zen = () => document.body.classList.toggle('zen');
  $('zen').addEventListener('click', zen);
  addEventListener('keydown', e => { if (e.key === 'h' && !e.metaKey && !e.ctrlKey) zen(); });

  refreshGraph(); refreshActivity();
  setInterval(refreshGraph, 8000);
  setInterval(refreshActivity, 5000);
  window.addEventListener('resize', () => { Graph.width(innerWidth); Graph.height(innerHeight); });
</script>
</body>
</html>
