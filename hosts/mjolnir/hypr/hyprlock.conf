# Hyprlock — Hyprland's lock screen. This uses hyprlang (not lua).
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

background {
    monitor =
    color = rgba(1a1b26ff)
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgba(ff4fa3ff)
    inner_color = rgba(1a1b26cc)
    font_color = rgba(c0caf5ff)
    fade_on_empty = true
    placeholder_text = <i>password…</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(2de2e6ff)
    font_size = 54
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = christina
    color = rgba(c0caf5ff)
    font_size = 16
    position = 0, 40
    halign = center
    valign = center
}
