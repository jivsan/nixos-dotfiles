# ───────────────────────────────────────────────
#  hyprlock — frosted cyan Tokyo Night
# ───────────────────────────────────────────────

background {
    monitor =
    path = /home/christina/.config/hypr/wall.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.65
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
    ignore_empty_input = true
}

# ── big clock ──
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(45, 226, 230, 0.95)
    font_size = 130
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 230
    halign = center
    valign = center
}

# ── date ──
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(200, 211, 245, 0.85)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# ── user ──
label {
    monitor =
    text =   $USER
    color = rgba(192, 153, 255, 0.90)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -210
    halign = center
    valign = center
}

# ── password input ──
input-field {
    monitor =
    size = 300, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    rounding = 18

    outer_color = rgba(45, 226, 230, 0.90)
    inner_color = rgba(13, 15, 23, 0.70)
    font_color  = rgb(c8d3f5)

    check_color = rgba(122, 162, 247, 0.95)
    fail_color  = rgba(255, 79, 163, 0.95)

    fade_on_empty = true
    placeholder_text = <i>password…</i>
    fail_text = <i>$FAIL  ($ATTEMPTS)</i>
    hide_input = false

    position = 0, -90
    halign = center
    valign = center
}
