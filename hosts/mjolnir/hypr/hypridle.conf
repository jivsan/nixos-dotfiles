general {
    lock_cmd = pidof hyprlock || hyprlock      # don't stack multiple lockers
    before_sleep_cmd = loginctl lock-session   # lock before the machine suspends
    after_sleep_cmd = hyprctl dispatch dpms on # wake displays on resume
    ignore_dbus_inhibit = false                # RESPECT idle inhibitors (video/games pause the timers)
    ignore_systemd_inhibit = false
}

# 8 min idle -> lock screen
listener {
    timeout = 480
    on-timeout = loginctl lock-session
}

# 12 min idle -> turn displays off (saves the panels; wakes on input)
listener {
    timeout = 720
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
