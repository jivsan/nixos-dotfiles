# Hypridle — idle management. hyprlang (not lua).
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    lock_cmd = pidof hyprlock || hyprlock     # avoid spawning multiple instances
    before_sleep_cmd = loginctl lock-session
    ignore_dbus_inhibit = false
}

# Lock after 10 min idle. Intentionally NO dpms-off and NO suspend listeners:
# on a headless VNC box, blanking the output freezes the Remmina view, and
# suspending would drop your remote session entirely. Add them back only if
# this VM ever gets a real display.
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}
