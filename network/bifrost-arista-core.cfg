! ============================================================
!  bifrost  —  Arista DCS-7050TX-48 core switch
!  Homelab L2 core + pfSense router-on-a-stick
!  Front panel: 32x 10GBASE-T (Et1-Et32) + 4x QSFP+ (Et33-Et36, unused)
!  (rename hostname to taste)
! ============================================================
!
hostname bifrost
!
spanning-tree mode mstp
!
! ---- VLANs --------------------------------------------------
vlan 20
   name trusted
!
vlan 30
   name storage
!
vlan 50
   name iot-wifi
!
! ---- In-band management (trusted VLAN 20) -------------------
!  Reach the switch at 10.0.20.2 from any VLAN 20 host.
!  Only ONE SVI exists, so the switch never routes between
!  VLANs -- all inter-VLAN traffic still hairpins to pfSense.
ip routing
!
interface Vlan20
   description in-band-mgmt
   ip address 10.0.20.2/24
!
ip route 0.0.0.0/0 10.0.20.1
!
!  pfSense as NTP source (optional; comment out if not ready yet)
ntp server 10.0.20.1
!
! ---- SSH server ---------------------------------------------
management ssh
   no shutdown
!
!  Keep/set your admin login (run at the console if needed):
!    username admin privilege 15 role network-admin secret <password>
!
! ============================================================
!  Et1  ->  pfSense  (router-on-a-stick trunk)
!  native VLAN 20 (untagged trusted LAN) + VLAN 50 tagged.
!  VLAN 30 is intentionally NOT allowed -- storage never routes.
! ============================================================
interface Ethernet1
   description pfSense-router
   switchport mode trunk
   switchport trunk native vlan 20
   switchport trunk allowed vlan 20,50
   spanning-tree portfast
!
! ============================================================
!  hella  —  Proxmox  |  Et2 + Et3  ->  Port-Channel1  (LACP)
!  native VLAN 20 (Proxmox host mgmt) + VLAN 50 tagged.
!  Carries nix-services (VLAN 20) and Home Assistant (VLAN 50).
! ============================================================
interface Port-Channel1
   description hella-proxmox
   switchport mode trunk
   switchport trunk native vlan 20
   switchport trunk allowed vlan 20,50
   spanning-tree portfast
!
interface Ethernet2
   description hella-p1
   channel-group 1 mode active
!
interface Ethernet3
   description hella-p2
   channel-group 1 mode active
!
! ============================================================
!  odyn  —  TrueNAS  |  Et4 + Et5  ->  Port-Channel2  (LACP)
!  native VLAN 20 (mgmt) + VLAN 30 tagged (storage fast-path).
! ============================================================
interface Port-Channel2
   description odyn-truenas
   switchport mode trunk
   switchport trunk native vlan 20
   switchport trunk allowed vlan 20,30
   spanning-tree portfast
!
interface Ethernet4
   description odyn-p1
   channel-group 2 mode active
!
interface Ethernet5
   description odyn-p2
   channel-group 2 mode active
!
! ============================================================
!  mimir  —  NixOS AI  |  Et6 + Et7  ->  Port-Channel3  (LACP)
!  native VLAN 20 (mgmt) + VLAN 30 tagged (storage to odyn).
!  NOTE: mimir has ONE NIC today. Run its single NIC as an
!  802.3ad bond so it matches Po3 (single-member LACP forwards
!  fine), then add Et7 + the second NIC to both sides later.
! ============================================================
interface Port-Channel3
   description mimir-nixos
   switchport mode trunk
   switchport trunk native vlan 20
   switchport trunk allowed vlan 20,30
   spanning-tree portfast
!
interface Ethernet6
   description mimir-p1
   channel-group 3 mode active
!
interface Ethernet7
   description mimir-p2
   channel-group 3 mode active
!
! ============================================================
!  mjolnir  —  workstation  |  Et8  (single 10G, access VLAN 20)
!  Direct to the core now -- no QNAP in the path.
! ============================================================
interface Ethernet8
   description mjolnir-workstation
   switchport mode access
   switchport access vlan 20
   spanning-tree portfast
!
! ============================================================
!  TP-Link switch  —  IoT/Wi-Fi  |  Et9  (access VLAN 50)
!  Everything plugged into the TP-Link is untagged VLAN 50.
! ============================================================
interface Ethernet9
   description tplink-iot-wifi
   switchport mode access
   switchport access vlan 50
   spanning-tree portfast
!
! ============================================================
!  Fan control — quiet idle (fixed 30%).
!  Forces 30% at all times: quietest, but will NOT ramp if the
!  ASIC heats up. Watch `show environment temperature`; bump to
!  40 under sustained load. To let fans auto-ramp with temp
!  instead (still quiet at idle):  environment fan-speed auto
! ============================================================
environment fan-speed override 30
!
end
